{% extends "base.html" %}
{% block title %}Forgot password – Notes{% endblock %}
{% block body %}
<div class="min-h-screen bg-app flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-4xl mb-3">🔑</div>
      <h1 class="text-2xl font-bold text-primary tracking-tight">Reset password</h1>
      <p class="text-sm text-muted mt-1">Enter your email and we'll send a link</p>
    </div>
    <div class="bg-surface rounded-2xl border border-base p-6 shadow-sm">
      {% if success %}
      <div class="bg-success rounded-lg px-4 py-3 text-sm">{{ success }}</div>
      {% else %}
      <form method="post" action="/forgot-password" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-secondary mb-1.5">Email</label>
          <input type="email" name="email" required autofocus
                 class="input-base w-full px-3 py-2.5 rounded-xl border text-sm" />
        </div>
        <button type="submit" class="btn-accent w-full py-2.5 rounded-xl text-sm font-semibold">Send reset link</button>
      </form>
      {% endif %}
    </div>
    <p class="text-center text-sm text-muted mt-5">
      <a href="/login" class="text-accent hover:underline">Back to sign in</a>
    </p>
  </div>
</div>
{% endblock %}

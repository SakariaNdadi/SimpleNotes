<!DOCTYPE html>
<html lang="en" data-palette="default">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Notes{% endblock %}</title>
  <!-- Apply saved palette before page renders to avoid flash -->
  <script>
    (function(){
      var p = localStorage.getItem('notes-palette') || 'default';
      document.documentElement.setAttribute('data-palette', p);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="/static/tailwind.min.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/alpinejs.min.js" defer></script>
</head>
<body class="bg-app text-primary font-sans antialiased">
  {% block body %}{% endblock %}
</body>
</html>

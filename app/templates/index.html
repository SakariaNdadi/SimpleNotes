{% extends "base.html" %}
{% block title %}Notes{% endblock %}
{% block body %}
<div class="flex h-screen overflow-hidden bg-app text-primary" x-data="appState()" x-init="init()">

    <!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
    <aside
        class="flex flex-col flex-shrink-0 w-64 bg-surface border-r border-base overflow-y-auto transition-transform duration-200"
        :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'"
        style="position: fixed; top:0; left:0; bottom:0; z-index:40; md:position:relative" x-cloak>
        <!-- Logo -->
        <div class="flex items-center justify-between px-4 h-14 border-b border-base flex-shrink-0">
            <span class="font-semibold text-[15px] tracking-tight text-primary">📝 Notes</span>
            <button class="md:hidden text-muted hover:text-primary p-1 rounded" @click="sidebarOpen=false">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- New Note -->
        <div class="px-3 py-3 border-b border-base">
            <button @click="openComposer()"
                class="w-full btn-accent text-sm font-medium py-2 px-4 rounded-lg flex items-center gap-2 justify-center">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                New note
            </button>
        </div>

        <!-- Labels -->
        <div class="flex-1 overflow-y-auto py-2">
            <div class="px-3 mb-1">
                <span class="text-[11px] font-semibold text-muted uppercase tracking-widest">Labels</span>
            </div>

            <!-- All notes -->
            <button
                class="w-full text-left px-3 py-2 text-sm rounded-lg mx-0 flex items-center gap-2 hover:bg-surface2 transition-colors"
                :class="activeLabelId === '' ? 'label-active' : 'text-secondary'" hx-get="/notes" hx-target="#note-feed"
                hx-swap="innerHTML" @click="activeLabelId = ''; $store.app.activeLabelId = ''">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
                All notes
            </button>

            <!-- Label list (HTMX-managed) -->
            <div id="label-list" hx-get="/labels" hx-trigger="load, labelChanged from:body" hx-target="#label-list"
                hx-swap="innerHTML">
            </div>

            <!-- Add label toggle -->
            <div x-data="{ open: false }" class="px-3 mt-1">
                <button @click="open = !open"
                    class="text-[12px] text-muted hover:text-accent flex items-center gap-1 py-1 transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    Add label
                </button>
                <form x-show="open" x-transition hx-post="/labels" hx-target="#label-list" hx-swap="innerHTML"
                    hx-on::after-request="open = false; htmx.trigger(document.body, 'labelChanged')"
                    class="mt-2 space-y-1.5">
                    <input type="text" name="title" placeholder="Label name" required
                        class="input-base w-full text-sm px-3 py-1.5 rounded-md border" />
                    <input type="text" name="description" placeholder="Description (optional)"
                        class="input-base w-full text-sm px-3 py-1.5 rounded-md border" />
                    <div class="flex gap-2">
                        <button type="submit" class="btn-accent text-xs font-medium px-3 py-1.5 rounded-md">Add</button>
                        <button type="button" @click="open = false"
                            class="text-xs text-secondary hover:text-primary px-3 py-1.5 rounded-md border border-base hover:bg-surface2">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Library section -->
            <div class="px-3 mt-4 pt-3 border-t border-base">
                <span class="text-[11px] font-semibold text-muted uppercase tracking-widest">Library</span>
                <button
                    class="w-full text-left px-2 py-2 text-sm rounded-lg flex items-center gap-2 hover:bg-surface2 text-secondary mt-1 transition-colors"
                    hx-get="/notes/archive" hx-target="#note-feed" hx-swap="innerHTML"
                    @click="activeLabelId = '__archive__'; $store.app.activeLabelId = '__archive__'">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8l1 12a2 2 0 002 2h8a2 2 0 002-2l1-12"/>
                    </svg>
                    Archive
                </button>
                <button
                    class="w-full text-left px-2 py-2 text-sm rounded-lg flex items-center gap-2 hover:bg-surface2 text-secondary transition-colors"
                    hx-get="/notes/trash" hx-target="#note-feed" hx-swap="innerHTML"
                    @click="activeLabelId = '__trash__'; $store.app.activeLabelId = '__trash__'">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                    Trash
                </button>
            </div>

            <!-- Tasks link with badge -->
            <div class="px-3 mt-1">
                <button
                    class="w-full text-left px-2 py-2 text-sm rounded-lg flex items-center gap-2 hover:bg-surface2 text-secondary transition-colors"
                    @click="settingsPanel = 'tasks'">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                    </svg>
                    Tasks
                    <span id="task-count-badge"
                          hx-get="/tasks/count"
                          hx-trigger="load, taskCountChanged from:body"
                          hx-swap="innerHTML"
                          class="ml-auto"></span>
                </button>
            </div>
        </div>

        <!-- Bottom nav -->
        <div class="border-t border-base py-2 flex-shrink-0">
            <button @click="settingsPanel = 'llm'"
                class="w-full text-left px-4 py-2 text-sm text-secondary hover:bg-surface2 hover:text-primary flex items-center gap-2.5 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2" />
                </svg>
                AI / LLM
            </button>
            <button @click="settingsPanel = 'integrations'"
                class="w-full text-left px-4 py-2 text-sm text-secondary hover:bg-surface2 hover:text-primary flex items-center gap-2.5 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                Integrations
            </button>
            <button @click="settingsPanel = 'customize'"
                class="w-full text-left px-4 py-2 text-sm text-secondary hover:bg-surface2 hover:text-primary flex items-center gap-2.5 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
                </svg>
                Customize
            </button>
            <button @click="settingsPanel = 'profile'"
                class="w-full text-left px-4 py-2 text-sm text-secondary hover:bg-surface2 hover:text-primary flex items-center gap-2.5 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                {{ user.username }}
            </button>
            <form method="post" action="/logout">
                <button type="submit"
                    class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-red-50 flex items-center gap-2.5 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Sign out
                </button>
            </form>
        </div>
    </aside>

    <!-- Sidebar backdrop (mobile) -->
    <div x-show="sidebarOpen" @click="sidebarOpen=false" class="fixed inset-0 bg-black/30 z-30 md:hidden" x-cloak></div>

    <!-- ── Main ─────────────────────────────────────────────────────────────── -->
    <main class="flex-1 flex flex-col overflow-hidden md:ml-64">

        <!-- Topbar -->
        <header class="h-14 flex items-center gap-3 px-4 border-b border-base bg-surface flex-shrink-0">
            <button @click="sidebarOpen = !sidebarOpen"
                class="p-1.5 rounded-lg text-muted hover:text-primary hover:bg-surface2 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

            <!-- Search -->
            <form
                class="flex-1 flex items-center gap-2 bg-surface2 border border-base rounded-xl px-3 py-1.5 focus-within:border-[color:var(--accent)] transition-colors"
                hx-post="/ai/search" hx-target="#note-feed" hx-swap="innerHTML" hx-indicator="#search-indicator"
                hx-trigger="input changed delay:350ms from:[name='query'], submit"
                @submit.prevent
                @input="if (!searchQuery) { searchActive = false; htmx.ajax('GET', '/notes?label_id=' + activeLabelId, { target: '#note-feed', swap: 'innerHTML' }) } else { searchActive = true }">
                <svg class="w-4 h-4 text-muted flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input type="text" name="query" placeholder="Search notes…" x-model="searchQuery"
                    class="flex-1 bg-transparent text-sm text-primary placeholder-[color:var(--text-3)] outline-none" />
                <span id="search-indicator" class="htmx-indicator text-muted text-xs">
                    <span class="spinner"></span>Searching…
                </span>
            </form>

            <!-- Clear search -->
            <button x-show="searchActive" x-cloak @click="clearSearch()"
                class="text-xs text-secondary hover:text-primary px-2 py-1 rounded-lg border border-base hover:bg-surface2 transition-colors flex items-center gap-1 flex-shrink-0">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
                Clear
            </button>

            <!-- Palette picker -->
            <div x-data="{ open: false }" class="relative flex-shrink-0">
                <button @click="open = !open" title="Change color theme"
                    class="p-1.5 rounded-lg text-muted hover:text-primary hover:bg-surface2 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
                    </svg>
                </button>
                <div x-show="open" @click.outside="open=false" x-transition
                    class="absolute right-0 top-10 bg-surface border border-base rounded-xl p-3 shadow-xl z-50 flex items-center gap-2 flex-shrink-0">
                    <template x-for="p in palettes" :key="p.id">
                        <button @click="setPalette(p.id); open=false" :title="p.label"
                            class="w-6 h-6 rounded-full border-2 transition-all hover:scale-110"
                            :class="currentPalette === p.id ? 'border-gray-800 scale-110' : 'border-transparent'"
                            :style="'background:' + p.swatch">
                        </button>
                    </template>
                </div>
            </div>
        </header>

        <!-- Composer -->
        <div x-show="composerOpen" x-transition x-cloak class="px-4 pt-4 pb-0 max-w-2xl w-full mx-auto">
            <form class="bg-surface border border-base rounded-xl shadow-sm overflow-hidden" hx-post="/notes"
                hx-target="#note-feed" hx-swap="afterbegin" hx-on::after-request="closeComposer()"
                @keydown.ctrl.enter="$el.requestSubmit()" @keydown.meta.enter="$el.requestSubmit()">
                <textarea name="description" rows="3" required x-ref="composerTA"
                    placeholder="Write a note… (Ctrl+Enter to save)"
                    class="input-base w-full px-4 pt-3 pb-1 text-[15px] leading-relaxed resize-none border-0 focus:ring-0"></textarea>
                <div class="flex items-center justify-between px-3 py-2 border-t border-base bg-surface2">
                    <select name="label_id"
                        class="input-base text-sm px-2 py-1 rounded-md border text-secondary bg-surface2 cursor-pointer">
                        <option value="">No label</option>
                        {% for label in labels %}
                        <option value="{{ label.id }}">{{ label.title }}</option>
                        {% endfor %}
                    </select>
                    <div class="flex items-center gap-2">
                        <button type="button" @click="closeComposer()"
                            class="text-sm text-secondary hover:text-primary px-3 py-1.5 rounded-lg transition-colors">Cancel</button>
                        <button type="submit"
                            class="btn-accent text-sm font-medium px-4 py-1.5 rounded-lg">Save</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Note feed -->
        <div class="flex-1 overflow-y-auto">
            <div id="note-feed" class="px-4 py-4 max-w-2xl mx-auto" hx-get="/notes" hx-trigger="load"
                hx-swap="innerHTML">
                <div class="text-center text-muted py-12 text-sm">Loading…</div>
            </div>
        </div>
    </main>

    <!-- ── Settings Slide-over ───────────────────────────────────────────────── -->
    <div x-show="settingsPanel" x-cloak @click.self="settingsPanel = null"
        class="fixed inset-0 bg-black/25 z-50 backdrop-blur-sm">
    </div>
    <aside x-show="settingsPanel" x-cloak x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
        x-transition:leave="transition ease-in duration-150" x-transition:leave-start="translate-x-0"
        x-transition:leave-end="translate-x-full"
        class="fixed right-0 top-0 bottom-0 w-[400px] max-w-full bg-surface border-l border-base z-50 flex flex-col shadow-2xl">
        <div class="flex items-center justify-between px-5 py-4 border-b border-base flex-shrink-0">
            <h3 class="font-semibold text-[15px] text-primary" x-text="panelTitle()"></h3>
            <button @click="settingsPanel = null"
                class="p-1.5 text-muted hover:text-primary hover:bg-surface2 rounded-lg transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="flex-1 overflow-y-auto p-5" x-effect="if(settingsPanel) loadPanel(settingsPanel)">
            <div id="settings-content"></div>
        </div>
    </aside>

</div>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.store('app', { activeLabelId: '' });
    });

    const FONT_MAP = {
        inter:  'Inter, sans-serif',
        serif:  'Georgia, serif',
        mono:   "'Courier New', monospace",
        caveat: "'Caveat', cursive",
        system: 'system-ui, sans-serif',
    };

    function appState() {
        return {
            sidebarOpen: window.innerWidth >= 768,
            composerOpen: false,
            searchQuery: '',
            searchActive: false,
            activeLabelId: '',
            settingsPanel: null,

            currentPalette: localStorage.getItem('notes-palette') || '{{ prefs.palette }}',
            palettes: [
                { id: 'default',  label: 'Default',  swatch: '#2563eb' },
                { id: 'ocean',    label: 'Ocean',     swatch: '#0284c7' },
                { id: 'forest',   label: 'Forest',    swatch: '#16a34a' },
                { id: 'sunset',   label: 'Sunset',    swatch: '#ea580c' },
                { id: 'lavender', label: 'Lavender',  swatch: '#7c3aed' },
                { id: 'dark',     label: 'Dark',      swatch: '#18181b' },
            ],

            init() {
                const p = new URLSearchParams(window.location.search);
                if (p.get('connected')) this.settingsPanel = 'integrations';

                // Apply saved font (localStorage first, fallback to DB pref)
                const savedFont = localStorage.getItem('notes-font') || '{{ prefs.font }}';
                if (savedFont && FONT_MAP[savedFont]) {
                    document.body.style.fontFamily = FONT_MAP[savedFont];
                }

                // Apply palette from DB if not already set in localStorage
                const savedPalette = localStorage.getItem('notes-palette') || '{{ prefs.palette }}';
                document.documentElement.setAttribute('data-palette', savedPalette);
                this.currentPalette = savedPalette;

                // Listen for font changes from preferences panel
                document.body.addEventListener('htmx:afterSettle', (e) => {
                    const trigger = e.detail?.xhr?.getResponseHeader('HX-Trigger');
                    if (trigger) {
                        try {
                            const parsed = JSON.parse(trigger);
                            if (parsed.fontChanged && FONT_MAP[parsed.fontChanged]) {
                                document.body.style.fontFamily = FONT_MAP[parsed.fontChanged];
                                localStorage.setItem('notes-font', parsed.fontChanged);
                            }
                        } catch (_) {}
                    }
                });
            },

            setPalette(id) {
                this.currentPalette = id;
                localStorage.setItem('notes-palette', id);
                document.documentElement.setAttribute('data-palette', id);
                // Persist to DB (fire-and-forget)
                fetch('/preferences/palette', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'palette=' + encodeURIComponent(id),
                });
            },

            openComposer() {
                this.composerOpen = true;
                this.$nextTick(() => this.$refs.composerTA?.focus());
            },
            closeComposer() { this.composerOpen = false; },

            clearSearch() {
                this.searchActive = false;
                this.searchQuery = '';
                htmx.ajax('GET', '/notes?label_id=' + this.activeLabelId, { target: '#note-feed', swap: 'innerHTML' });
            },

            panelTitle() {
                return {
                    llm: '🤖 AI / LLM',
                    integrations: '📅 Integrations',
                    profile: '👤 Profile',
                    tasks: '✅ Tasks',
                    customize: '🎨 Customize',
                }[this.settingsPanel] || '';
            },

            loadPanel(panel) {
                const map = {
                    llm: '/settings/llm',
                    integrations: '/integrations/panel',
                    profile: '/profile',
                    tasks: '/tasks',
                    customize: '/preferences',
                };
                if (map[panel]) htmx.ajax('GET', map[panel], { target: '#settings-content', swap: 'innerHTML' });
            },
        };
    }
</script>
{% endblock %}

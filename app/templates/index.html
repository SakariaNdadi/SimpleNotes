{% extends "base.html" %}
{% block title %}Notes{% endblock %}
{% block body %}
<div class="flex h-screen overflow-hidden bg-app text-primary" x-data="appState()" x-init="init()">

    <aside
        class="flex flex-col flex-shrink-0 w-64 bg-surface border-r border-base overflow-y-auto transition-transform duration-200"
        :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'"
        style="position: fixed; top:0; left:0; bottom:0; z-index:40; md:position:relative" x-cloak>

        <div class="flex items-center justify-between px-4 h-12 border-b border-base flex-shrink-0">
            <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
                <span class="font-semibold text-[14px] tracking-tight text-primary">Notes</span>
            </div>
            <button class="md:hidden text-muted hover:text-primary p-1 rounded hover:bg-surface2 transition-colors"
                @click="sidebarOpen=false">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="px-3 py-3 border-b border-base">
            <button @click="openComposer()"
                class="w-full btn-accent text-[13px] font-medium py-1.5 px-4 rounded flex items-center gap-2 justify-center shadow-sm">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                New note
            </button>
        </div>

        <div class="flex-1 overflow-y-auto py-2">
            <div class="px-3 mb-1">
                <span class="text-[10px] font-semibold text-muted uppercase tracking-widest">Labels</span>
            </div>

            <button
                class="w-full text-left px-3 py-1.5 text-[13px] rounded mx-0 flex items-center gap-2 hover:bg-surface2 transition-colors"
                :class="activeLabelId === '' ? 'label-active' : 'text-secondary'" hx-get="/notes" hx-target="#note-feed"
                hx-swap="innerHTML" @click="activeLabelId = ''; $store.app.activeLabelId = ''">
                <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
                All notes
            </button>

            <div id="label-list" hx-get="/labels" hx-trigger="load, labelChanged from:body" hx-target="#label-list"
                hx-swap="innerHTML"></div>

            <div x-data="{ addLabelOpen: false }" class="px-3 mt-1">
                <button @click="addLabelOpen = !addLabelOpen"
                    class="text-[11px] text-muted hover:text-accent flex items-center gap-1 py-1 transition-colors">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    Add label
                </button>
                <form x-show="addLabelOpen" x-transition hx-post="/labels" hx-target="#label-list" hx-swap="innerHTML"
                    hx-on::after-request="addLabelOpen = false; this.reset()"
                    class="mt-1.5 space-y-1.5 bg-surface2 p-2 rounded border border-base">
                    <input type="text" name="title" placeholder="Label name" required
                        class="input-base w-full text-[12px] px-2 py-1 rounded border outline-none focus:border-accent" />
                    <input type="text" name="description" placeholder="Description (optional)"
                        class="input-base w-full text-[12px] px-2 py-1 rounded border outline-none focus:border-accent" />
                    <div class="flex items-center gap-1.5">
                        <input type="color" name="color" value="#6366f1"
                            class="w-6 h-6 rounded cursor-pointer border border-base bg-transparent p-0.5 flex-shrink-0" />
                        <span class="text-[10px] text-muted">Color</span>
                    </div>
                    <div class="flex gap-1.5 pt-0.5">
                        <button type="submit"
                            class="btn-accent text-[11px] font-medium px-2.5 py-1 rounded">Add</button>
                        <button type="button" @click="addLabelOpen = false"
                            class="text-[11px] text-secondary hover:text-primary px-2.5 py-1 rounded border border-base bg-surface hover:bg-surface2 transition-colors">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="px-3 mt-4 pt-3 border-t border-base">
                <span class="text-[10px] font-semibold text-muted uppercase tracking-widest">Library</span>
                <button
                    class="w-full text-left px-2 py-1.5 text-[13px] rounded flex items-center gap-2 hover:bg-surface2 text-secondary mt-1 transition-colors"
                    hx-get="/notes/archive" hx-target="#note-feed" hx-swap="innerHTML"
                    @click="activeLabelId = '__archive__'; $store.app.activeLabelId = '__archive__'">
                    <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8l1 12a2 2 0 002 2h8a2 2 0 002-2l1-12" />
                    </svg>
                    Archive
                </button>
                <button
                    class="w-full text-left px-2 py-1.5 text-[13px] rounded flex items-center gap-2 hover:bg-surface2 text-secondary transition-colors"
                    hx-get="/notes/trash" hx-target="#note-feed" hx-swap="innerHTML"
                    @click="activeLabelId = '__trash__'; $store.app.activeLabelId = '__trash__'">
                    <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    Trash
                </button>
            </div>

            <div class="px-3 mt-1">
                <button
                    class="w-full text-left px-2 py-1.5 text-[13px] rounded flex items-center gap-2 hover:bg-surface2 text-secondary transition-colors"
                    @click="settingsPanel = 'tasks'">
                    <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                    </svg>
                    Tasks
                    <span id="task-count-badge" hx-get="/tasks/count" hx-trigger="load, taskCountChanged from:body"
                        hx-swap="innerHTML" class="ml-auto"></span>
                </button>
            </div>
        </div>

        <div class="border-t border-base py-1.5 flex-shrink-0">
            <button @click="toggleAI()"
                class="w-full text-left px-4 py-1.5 text-[13px] flex items-center gap-2.5 transition-colors"
                :class="aiEnabled ? 'text-[color:var(--accent)] font-medium' : 'text-secondary hover:bg-surface2 hover:text-primary'">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                </svg>
                <span x-text="aiEnabled ? 'AI enabled' : 'Enable AI'"></span>
                <span x-show="aiEnabled" class="ml-auto w-1.5 h-1.5 rounded-full bg-[color:var(--accent)]"></span>
            </button>
            <button @click="settingsPanel = 'llm'"
                class="w-full text-left px-4 py-1.5 text-[13px] text-secondary hover:bg-surface2 hover:text-primary flex items-center gap-2.5 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2" />
                </svg>
                AI / LLM
            </button>
            <button @click="settingsPanel = 'integrations'"
                class="w-full text-left px-4 py-1.5 text-[13px] text-secondary hover:bg-surface2 hover:text-primary flex items-center gap-2.5 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                Integrations
            </button>
            <button @click="settingsPanel = 'customize'"
                class="w-full text-left px-4 py-1.5 text-[13px] text-secondary hover:bg-surface2 hover:text-primary flex items-center gap-2.5 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
                </svg>
                Customize
            </button>
            <button @click="settingsPanel = 'profile'"
                class="w-full text-left px-4 py-1.5 text-[13px] text-secondary hover:bg-surface2 hover:text-primary flex items-center gap-2.5 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                {{ user.username }}
            </button>
            <form method="post" action="/logout">
                <button type="submit"
                    class="w-full text-left px-4 py-1.5 text-[13px] text-red-500 hover:bg-red-50 hover:text-red-600 flex items-center gap-2.5 transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Sign out
                </button>
            </form>
        </div>
    </aside>

    <div x-show="sidebarOpen" @click="sidebarOpen=false"
        class="fixed inset-0 bg-black/20 z-30 md:hidden transition-opacity" x-cloak></div>

    <main class="flex-1 flex flex-col overflow-hidden md:ml-64 relative bg-bg">
        <header class="h-12 flex items-center gap-3 px-4 border-b border-base bg-surface flex-shrink-0 z-10">
            <button @click="sidebarOpen = !sidebarOpen"
                class="p-1.5 rounded text-muted hover:text-primary hover:bg-surface2 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

            <form id="search-form"
                class="flex-1 flex items-center gap-2 bg-surface2 border border-transparent focus-within:border-[color:var(--accent)] focus-within:bg-surface rounded px-2.5 py-1.5 transition-all"
                hx-post="/notes/search" hx-target="#note-feed" hx-swap="innerHTML" hx-indicator="#search-indicator"
                hx-trigger="input changed delay:350ms from:[name='query'], submit" @submit.prevent
                @input="if (!searchQuery) { searchActive = false; htmx.ajax('GET', '/notes?label_id=' + activeLabelId, { target: '#note-feed', swap: 'innerHTML' }) } else { searchActive = true }">
                <svg class="w-3.5 h-3.5 text-muted flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input type="text" name="query" id="search-query" placeholder="Search notes..." x-model="searchQuery"
                    :disabled="aiSearching"
                    :placeholder="aiSearching ? 'Searching with AI…' : (aiEnabled ? 'Ask AI or search…' : 'Search notes…')"
                    class="flex-1 bg-transparent text-[13px] text-primary placeholder-[color:var(--text-3)] outline-none disabled:opacity-50" />
                <span id="search-indicator" class="htmx-indicator text-muted text-[11px] flex items-center gap-1">
                    <span class="spinner w-3 h-3 border-2"></span>
                </span>
            </form>

            <button x-show="searchActive" x-cloak @click="clearSearch()"
                class="text-[11px] text-secondary hover:text-primary px-2 py-1 rounded border border-base bg-surface hover:bg-surface2 transition-colors flex items-center gap-1 flex-shrink-0">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
                Clear
            </button>

            <button x-show="aiEnabled && searchQuery" x-cloak
                :disabled="aiSearching"
                hx-post="/ai/search" hx-target="#note-feed" hx-swap="innerHTML"
                hx-include="#search-query"
                @htmx:before-request="aiSearching = true; searchActive = true"
                @htmx:after-request="aiSearching = false"
                class="flex-shrink-0 flex items-center gap-1 text-[11px] font-semibold px-3 py-1.5 rounded-lg transition-colors bg-[color:var(--accent)] text-white hover:opacity-90 disabled:opacity-40 disabled:cursor-not-allowed shadow-sm">
                <svg class="w-3.5 h-3.5" :class="aiSearching ? 'animate-spin' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                </svg>
                <span x-text="aiSearching ? 'Searching…' : 'Ask AI'"></span>
            </button>

            <div x-data="{ paletteDropdownOpen: false }" class="relative flex-shrink-0">
                <button @click="paletteDropdownOpen = !paletteDropdownOpen" title="Change theme"
                    class="p-1.5 rounded text-muted hover:text-primary hover:bg-surface2 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
                    </svg>
                </button>
                <div x-show="paletteDropdownOpen" @click.outside="paletteDropdownOpen=false"
                    x-transition.opacity.scale.95
                    class="absolute right-0 top-10 bg-surface border border-base rounded p-2 shadow-lg z-50 flex flex-wrap w-[116px] gap-2">
                    <template x-for="palette in palettes" :key="palette.id">
                        <button @click="setPalette(palette.id); paletteDropdownOpen=false" :title="palette.label"
                            class="w-5 h-5 rounded-full border-2 transition-transform hover:scale-110"
                            :class="currentPalette === palette.id ? 'border-gray-800 scale-110' : 'border-transparent'"
                            :style="'background:' + palette.swatch">
                        </button>
                    </template>
                </div>
            </div>
        </header>

        <div x-show="composerOpen" x-transition x-cloak class="px-4 pt-4 pb-0 max-w-2xl w-full mx-auto relative z-0">
            <form
                x-data="{ saving: false }"
                class="bg-surface border border-accent rounded shadow-sm overflow-hidden focus-within:ring-1 focus-within:ring-accent transition-shadow"
                hx-post="/notes" hx-target="#note-feed" hx-swap="innerHTML"
                @htmx:before-request="saving = true"
                @htmx:after-request="saving = false; if($event.detail.successful){ $el.reset(); htmx.ajax('GET', '/notes?label_id=' + ($store.app?.activeLabelId || ''), {target:'#note-feed', swap:'innerHTML'}) }"
                @keydown.ctrl.enter="$el.requestSubmit()" @keydown.meta.enter="$el.requestSubmit()">
                <textarea name="description" rows="3" required x-ref="composerTA"
                    placeholder="Write a note... (Ctrl+Enter to save)"
                    class="input-base w-full px-3 pt-2.5 pb-1 text-[13px] leading-snug resize-none border-0 focus:ring-0 bg-transparent"></textarea>
                <div x-data="{
                    schedOpen: false, allDay: false,
                    get nowMin() {
                        const now = new Date();
                        if (this.allDay) return now.toISOString().slice(0, 10);
                        return new Date(now - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
                    }
                }" class="border-t border-base">
                    <div class="flex items-center justify-between px-2 py-1.5 bg-surface2">
                        <div class="flex items-center gap-1.5">
                            <select name="label_id"
                                class="input-base text-[11px] px-1.5 py-0.5 rounded border text-secondary bg-surface cursor-pointer outline-none focus:border-accent">
                                <option value="">No label</option>
                                {% for label in labels %}
                                <option value="{{ label.id }}">{{ label.title }}</option>
                                {% endfor %}
                            </select>
                            <button type="button" @click="schedOpen = !schedOpen"
                                :class="schedOpen ? 'text-[color:var(--accent)] border-[color:var(--accent)]/40 bg-[color:var(--accent)]/5' : 'text-muted border-base hover:text-primary'"
                                class="inline-flex items-center gap-1 text-[11px] px-2 py-0.5 rounded border transition-colors">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                                Schedule
                            </button>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <button type="button" @click="closeComposer()"
                                class="text-[11px] text-secondary hover:text-primary px-2.5 py-1 rounded transition-colors">Cancel</button>
                            <button type="submit" :disabled="saving"
                                class="btn-accent text-[11px] font-medium px-3 py-1 rounded flex items-center gap-1.5 disabled:opacity-60 disabled:cursor-not-allowed">
                                <span x-show="saving" class="spinner w-3 h-3 border-2"></span>
                                <span x-text="saving ? 'Saving…' : 'Save'"></span>
                            </button>
                        </div>
                    </div>
                    <div x-show="schedOpen" x-transition class="px-2 pb-2 bg-surface2 space-y-1.5">
                        <label class="flex items-center gap-1.5 text-[11px] text-secondary cursor-pointer">
                            <input type="checkbox" name="is_all_day" x-model="allDay" value="1"
                                class="rounded border-base accent-[color:var(--accent)]" />
                            All day
                        </label>
                        <div x-show="!allDay" x-transition class="flex gap-2">
                            <div class="flex-1">
                                <label class="block text-[10px] font-bold text-muted uppercase px-1 mb-1">Start</label>
                                <input type="datetime-local" name="start_datetime" :min="nowMin"
                                    class="input-premium" />
                            </div>
                            <div class="flex-1">
                                <label class="block text-[10px] font-bold text-muted uppercase px-1 mb-1">End</label>
                                <input type="datetime-local" name="end_datetime" :min="nowMin"
                                    class="input-premium" />
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div class="flex-1 overflow-y-auto">
            <div x-show="aiSearching" x-cloak
                class="px-4 py-10 max-w-2xl mx-auto flex flex-col items-center gap-3 text-muted text-[13px]">
                <span class="spinner w-5 h-5 border-2"></span>
                <span>Asking AI…</span>
            </div>
            <div id="note-feed" x-show="!aiSearching" class="px-4 py-4 max-w-2xl mx-auto" hx-get="/notes" hx-trigger="load"
                hx-swap="innerHTML">
                <div class="text-center text-muted py-10 text-[12px] flex items-center justify-center gap-2">
                    <span class="spinner border-2"></span> Loading...
                </div>
            </div>
        </div>
    </main>

    <!-- Unified settings overlay: backdrop + content container -->
    <div x-show="settingsPanel" x-cloak
        x-transition.opacity.duration.150
        @click.self="settingsPanel = null"
        class="fixed inset-0 bg-black/30 backdrop-blur-sm z-50"
        :class="$store.app.panelMode === 'modal' ? 'flex items-center justify-center p-4' : ''">

        <!-- Content box: panel drawer OR centered modal -->
        <div @click.stop
            x-transition:enter="transition ease-out duration-200"
            x-transition:leave="transition ease-in duration-150"
            :class="$store.app.panelMode === 'modal'
                ? 'opacity-100 scale-100 w-[520px] max-w-full max-h-[85vh] rounded-2xl border border-base shadow-2xl overflow-hidden'
                : 'fixed right-0 top-0 bottom-0 w-[400px] max-w-full border-l border-base shadow-2xl translate-x-0'"
            class="bg-surface flex flex-col">

            <div class="flex items-center justify-between px-4 py-3 border-b border-base flex-shrink-0">
                <h3 class="font-semibold text-[14px] text-primary flex items-center gap-2">
                    <svg class="w-4 h-4 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span x-text="panelTitle()"></span>
                </h3>
                <button @click="settingsPanel = null"
                    class="p-1 text-muted hover:text-primary hover:bg-surface2 rounded transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-4" x-effect="if(settingsPanel) loadPanel(settingsPanel)">
                <div id="settings-content" class="text-[13px]"></div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.store('app', {
            activeLabelId: '',
            aiEnabled: localStorage.getItem('notes-ai') === 'true',
            panelMode: localStorage.getItem('notes-panel-mode') || 'panel',
        });
    });

    const FONT_MAP = {
        inter: 'Inter, sans-serif',
        serif: 'Georgia, serif',
        mono: "'Courier New', monospace",
        caveat: "'Caveat', cursive",
        system: 'system-ui, sans-serif',
    };

    function appState() {
        return {
            sidebarOpen: window.innerWidth >= 768,
            composerOpen: false,
            searchQuery: '',
            searchActive: false,
            aiSearching: false,
            aiEnabled: localStorage.getItem('notes-ai') === 'true',
            panelMode: localStorage.getItem('notes-panel-mode') || 'panel',
            activeLabelId: '',
            settingsPanel: null,

            currentPalette: localStorage.getItem('notes-palette') || '{{ prefs.palette }}',
            palettes: [
                { id: 'default', label: 'Default', swatch: '#2563eb' },
                { id: 'ocean', label: 'Ocean', swatch: '#0284c7' },
                { id: 'forest', label: 'Forest', swatch: '#16a34a' },
                { id: 'sunset', label: 'Sunset', swatch: '#ea580c' },
                { id: 'lavender', label: 'Lavender', swatch: '#7c3aed' },
                { id: 'dark', label: 'Dark', swatch: '#18181b' },
            ],

            toggleAI() {
                this.aiEnabled = !this.aiEnabled;
                localStorage.setItem('notes-ai', this.aiEnabled);
                Alpine.store('app').aiEnabled = this.aiEnabled;
            },

            setPanelMode(mode) {
                this.panelMode = mode;
                localStorage.setItem('notes-panel-mode', mode);
                Alpine.store('app').panelMode = mode;
            },

            init() {
                Alpine.store('app').aiEnabled = this.aiEnabled;
                Alpine.store('app').panelMode = this.panelMode;
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('connected')) this.settingsPanel = 'integrations';

                const savedFont = localStorage.getItem('notes-font') || '{{ prefs.font }}';
                if (savedFont && FONT_MAP[savedFont]) {
                    document.body.style.fontFamily = FONT_MAP[savedFont];
                }

                const savedPalette = localStorage.getItem('notes-palette') || '{{ prefs.palette }}';
                document.documentElement.setAttribute('data-palette', savedPalette);
                this.currentPalette = savedPalette;

                document.body.addEventListener('htmx:afterSettle', (e) => {
                    const initTarget = e.detail?.target || e.detail?.elt;
                    if (initTarget) Alpine.initTree(initTarget);
                    const trigger = e.detail?.xhr?.getResponseHeader('HX-Trigger');
                    if (trigger) {
                        try {
                            const parsed = JSON.parse(trigger);
                            if (parsed.fontChanged && FONT_MAP[parsed.fontChanged]) {
                                document.body.style.fontFamily = FONT_MAP[parsed.fontChanged];
                                localStorage.setItem('notes-font', parsed.fontChanged);
                            }
                        } catch (_) { }
                    }
                });
            },

            setPalette(id) {
                this.currentPalette = id;
                localStorage.setItem('notes-palette', id);
                document.documentElement.setAttribute('data-palette', id);
                fetch('/preferences/palette', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'palette=' + encodeURIComponent(id),
                });
            },

            openComposer() {
                this.composerOpen = true;
                this.$nextTick(() => this.$refs.composerTA?.focus());
            },

            closeComposer() {
                this.composerOpen = false;
            },

            clearSearch() {
                this.searchActive = false;
                this.searchQuery = '';
                htmx.ajax('GET', '/notes?label_id=' + this.activeLabelId, { target: '#note-feed', swap: 'innerHTML' });
            },

            panelTitle() {
                const titles = {
                    llm: 'AI / LLM Settings',
                    integrations: 'Integrations',
                    profile: 'Profile',
                    tasks: 'Tasks',
                    customize: 'Customize Appearance',
                };
                return titles[this.settingsPanel] || 'Settings';
            },

            loadPanel(panel) {
                const routeMap = {
                    llm: '/settings/llm',
                    integrations: '/integrations/panel',
                    profile: '/profile',
                    tasks: '/tasks',
                    customize: '/preferences',
                };
                if (routeMap[panel]) htmx.ajax('GET', routeMap[panel], { target: '#settings-content', swap: 'innerHTML' });
            },
        };
    }
</script>
{% endblock %}

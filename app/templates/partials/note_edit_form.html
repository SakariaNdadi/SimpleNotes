<div class="relative flex gap-2.5 pb-3" id="note-{{ note.id }}">
    <div class="flex-shrink-0 flex flex-col items-center z-10">
        <div class="w-2 h-2 rounded-full border-2 border-[color:var(--accent)] bg-[color:var(--accent)] mt-1.5"></div>
    </div>

    <div class="flex-1 min-w-0">
        <form hx-put="/notes/{{ note.id }}" hx-target="#note-{{ note.id }}" hx-swap="outerHTML"
            @keydown.ctrl.enter="$el.requestSubmit()" @keydown.meta.enter="$el.requestSubmit()"
            x-data="{ schedOpen: {{ 'true' if note.start_datetime else 'false' }}, allDay: {{ 'true' if note.is_all_day else 'false' }} }"
            class="border border-[color:var(--accent)] rounded-lg overflow-hidden bg-[color:var(--surface)]">
            <textarea name="description" rows="3" required autofocus
                class="input-base w-full text-[13px] leading-snug px-3 pt-2 pb-1 border-0 bg-transparent resize-none focus:ring-0">{{ note.description }}</textarea>
            <div class="border-t border-base">
                <div class="flex items-center justify-between px-2 py-1.5 bg-[color:var(--surface2)]">
                    <div class="flex items-center gap-1.5">
                        <select name="label_id"
                            class="input-base text-[11px] px-1.5 py-0.5 rounded border bg-[color:var(--surface2)]">
                            <option value="">No label</option>
                            {% for label in labels %}
                            <option value="{{ label.id }}" {% if note.label_id == label.id %}selected{% endif %}>
                                {{ label.title }}</option>
                            {% endfor %}
                        </select>
                        <button type="button" @click="schedOpen = !schedOpen"
                            :class="schedOpen ? 'text-[color:var(--accent)] border-[color:var(--accent)]/40 bg-[color:var(--accent)]/5' : 'text-muted border-base hover:text-primary'"
                            class="inline-flex items-center gap-1 text-[11px] px-2 py-0.5 rounded border transition-colors">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                            Schedule
                        </button>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <button type="button" hx-get="/notes/{{ note.id }}" hx-target="#note-{{ note.id }}"
                            hx-swap="outerHTML"
                            class="text-[11px] text-secondary hover:text-primary px-2 py-1 rounded transition-colors">Cancel</button>
                        <button type="submit" class="btn-accent text-[11px] font-medium px-3 py-1 rounded">Save</button>
                    </div>
                </div>
                <div x-show="schedOpen" x-transition class="px-2 pb-2 bg-[color:var(--surface2)] space-y-1.5">
                    <label class="flex items-center gap-1.5 text-[11px] text-secondary cursor-pointer">
                        <input type="checkbox" name="is_all_day" x-model="allDay" value="1"
                            {% if note.is_all_day %}checked{% endif %}
                            class="rounded border-base accent-[color:var(--accent)]" />
                        All day
                    </label>
                    <div class="flex gap-1.5">
                        <div class="flex-1">
                            <label class="block text-[10px] text-muted mb-0.5">Start</label>
                            <input :type="allDay ? 'date' : 'datetime-local'" name="start_datetime"
                                value="{{ note.start_datetime or '' }}"
                                class="input-base w-full text-[11px] px-2 py-1 rounded border bg-surface outline-none focus:border-[color:var(--accent)]" />
                        </div>
                        <div class="flex-1">
                            <label class="block text-[10px] text-muted mb-0.5">End</label>
                            <input :type="allDay ? 'date' : 'datetime-local'" name="end_datetime"
                                value="{{ note.end_datetime or '' }}"
                                class="input-base w-full text-[11px] px-2 py-1 rounded border bg-surface outline-none focus:border-[color:var(--accent)]" />
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

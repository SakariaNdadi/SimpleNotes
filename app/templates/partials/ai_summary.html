<div class="mt-3 p-3 bg-ai-surface border rounded-xl text-sm text-secondary" id="saved-summary-{{ note_id }}">
  <div class="flex items-center justify-between mb-1.5">
    <span class="text-xs font-semibold text-[color:var(--accent)] flex items-center gap-1">
      ✨ AI Summary
      {% if saved %}
      <span class="text-[10px] bg-tag px-1.5 py-0.5 rounded-full ml-1">Saved</span>
      {% endif %}
    </span>
    <div class="flex items-center gap-1">
      {% if saved %}
      <button hx-delete="/ai/summary/{{ note_id }}"
              hx-target="#saved-summary-{{ note_id }}"
              hx-swap="outerHTML"
              class="text-muted hover:text-red-500 text-xs px-1.5 py-0.5 rounded transition-colors">Delete</button>
      {% endif %}
      <button onclick="document.getElementById('saved-summary-{{ note_id }}').remove()"
              class="text-muted hover:text-primary text-xs px-1.5 py-0.5 rounded transition-colors">Dismiss</button>
    </div>
  </div>
  <p class="leading-relaxed">{{ summary }}</p>
</div>

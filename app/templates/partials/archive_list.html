<div class="px-4 py-3 border-b border-base flex-shrink-0">
  <h2 class="text-sm font-semibold text-secondary">Archive</h2>
  <p class="text-xs text-muted mt-0.5">Archived notes are hidden from your main feed</p>
</div>

{% if not notes %}
<div class="text-center text-muted py-20">
  <svg class="w-10 h-10 mx-auto mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8l1 12a2 2 0 002 2h8a2 2 0 002-2l1-12"/></svg>
  <p class="text-sm">Archive is empty</p>
</div>
{% else %}
<div class="relative px-4 py-4 max-w-2xl mx-auto timeline-feed">
  {% for note in notes %}
  <div class="relative flex gap-4 pb-6 group" id="archive-note-{{ note.id }}">
    <div class="flex-shrink-0 z-10">
      <div class="w-2.5 h-2.5 rounded-full bg-yellow-300 border-2 border-yellow-400 mt-1"></div>
    </div>
    <div class="flex-1 min-w-0">
      <div class="flex items-start justify-between gap-2 mb-1.5">
        <div class="flex items-center gap-1.5 flex-wrap">
          {% if note.label %}
          <span class="bg-tag text-[11px] font-medium px-2 py-0.5 rounded-full">{{ note.label.title }}</span>
          {% endif %}
          <time class="text-[11px] text-muted" title="{{ note.updated_at.strftime('%b %d, %Y %H:%M') }}">Archived {{ note.updated_at | humanize_date }}</time>
        </div>
        <button hx-post="/notes/{{ note.id }}/restore"
                hx-target="#archive-note-{{ note.id }}"
                hx-swap="outerHTML"
                class="text-xs text-[color:var(--accent)] hover:underline px-2 py-1 rounded border border-base hover:bg-[color:var(--surface2)] transition-colors flex-shrink-0">Restore</button>
      </div>
      <p class="text-[14px] leading-relaxed text-secondary note-body-clamped">{{ note.description }}</p>
    </div>
  </div>
  {% endfor %}
</div>
{% endif %}

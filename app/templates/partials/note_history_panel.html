<div class="bg-[color:var(--surface2)] border border-base rounded-lg overflow-hidden my-1">
    <div class="flex items-center justify-between px-2 py-1.5 border-b border-base">
        <span class="text-[10px] font-semibold text-secondary">
            Edit History ({{ entries|length }} version{{ 's' if entries|length != 1 else '' }})
        </span>
        <button onclick="document.getElementById('history-panel-{{ note_id }}').innerHTML=''"
            class="text-muted hover:text-primary p-0.5 rounded transition-colors">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>

    {% if not entries %}
    <p class="text-[11px] text-muted p-2">No history recorded yet.</p>
    {% else %}
    <div class="divide-y divide-[color:var(--border)]">
        {% for entry in entries %}
        <div class="px-2 py-1.5" x-data="{ open: false }">
            <div class="flex items-center justify-between gap-2">
                <button @click="open = !open"
                    class="text-[11px] text-secondary hover:text-primary flex items-center gap-1 transition-colors">
                    <svg class="w-2.5 h-2.5 flex-shrink-0 transition-transform" :class="open ? 'rotate-90' : ''"
                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                    {{ entry.saved_at.strftime('%b %d, %Y · %H:%M') }}
                </button>
                <button hx-post="/notes/{{ note_id }}/history/{{ entry.id }}/restore" hx-target="#note-{{ note_id }}"
                    hx-swap="outerHTML" hx-confirm="Restore this version? Current content will be saved to history."
                    class="text-[11px] text-[color:var(--accent)] hover:underline flex-shrink-0 transition-colors">Restore</button>
            </div>
            <div x-show="open" x-transition
                class="mt-1.5 text-[12px] text-muted leading-snug whitespace-pre-wrap break-words note-body-clamped pl-3">
                {{ entry.description }}</div>
        </div>
        {% endfor %}
    </div>
    {% endif %}
</div>

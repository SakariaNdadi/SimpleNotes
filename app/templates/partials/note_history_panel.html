<div class="bg-[color:var(--surface2)] border border-base rounded-xl overflow-hidden">
  <div class="flex items-center justify-between px-3 py-2 border-b border-base">
    <span class="text-xs font-semibold text-secondary">
      Edit History ({{ entries|length }} version{{ 's' if entries|length != 1 else '' }})
    </span>
    <button onclick="document.getElementById('history-panel-{{ note_id }}').innerHTML=''"
            class="text-xs text-muted hover:text-primary p-0.5 rounded transition-colors">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>

  {% if not entries %}
  <p class="text-xs text-muted p-3">No history recorded yet.</p>
  {% else %}
  <div class="divide-y divide-[color:var(--border)]">
    {% for entry in entries %}
    <div class="px-3 py-2" x-data="{ open: false }">
      <div class="flex items-center justify-between gap-2">
        <button @click="open = !open"
                class="text-xs text-secondary hover:text-primary flex items-center gap-1.5 transition-colors">
          <svg class="w-3 h-3 flex-shrink-0 transition-transform" :class="open ? 'rotate-90' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          {{ entry.saved_at.strftime('%b %d, %Y · %H:%M') }}
        </button>
        <button hx-post="/notes/{{ note_id }}/history/{{ entry.id }}/restore"
                hx-target="#note-{{ note_id }}"
                hx-swap="outerHTML"
                hx-confirm="Restore this version? Current content will be saved to history."
                class="text-xs text-[color:var(--accent)] hover:underline flex-shrink-0 transition-colors">Restore</button>
      </div>
      <div x-show="open" x-transition class="mt-2 text-[13px] text-muted leading-relaxed whitespace-pre-wrap break-words note-body-clamped pl-4">{{ entry.description }}</div>
    </div>
    {% endfor %}
  </div>
  {% endif %}
</div>

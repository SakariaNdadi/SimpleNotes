<div class="bg-surface rounded-xl border border-base p-4 group transition-all hover:shadow-sm"
     id="note-{{ note.id }}">

  <!-- Header row -->
  <div class="flex items-start justify-between gap-2 mb-2">
    <div class="flex items-center gap-2 flex-wrap">
      {% if note.label %}
      <span class="bg-tag text-xs font-medium px-2 py-0.5 rounded-full">{{ note.label.title }}</span>
      {% endif %}
      {% if note.is_edited %}
      <span class="bg-edited text-xs px-2 py-0.5 rounded-full"
            title="Edited {{ note.updated_at.strftime('%b %d, %Y %H:%M') }}">Edited</span>
      {% endif %}
    </div>
    <!-- Actions (visible on hover) -->
    <div class="flex items-center gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
      <button title="AI summary"
              hx-post="/ai/summary/{{ note.id }}"
              hx-target="#summary-{{ note.id }}"
              hx-swap="innerHTML"
              hx-indicator="#sum-ind-{{ note.id }}"
              class="p-1.5 text-muted hover:text-accent rounded-lg hover:bg-surface2 transition-colors text-sm">✨</button>
      <span id="sum-ind-{{ note.id }}" class="htmx-indicator"><span class="spinner"></span></span>
      <button title="Edit"
              hx-get="/notes/{{ note.id }}/edit"
              hx-target="#note-{{ note.id }}"
              hx-swap="outerHTML"
              class="p-1.5 text-muted hover:text-primary rounded-lg hover:bg-surface2 transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
      </button>
      <button title="Delete"
              hx-delete="/notes/{{ note.id }}"
              hx-target="#note-{{ note.id }}"
              hx-swap="outerHTML"
              hx-confirm="Delete this note?"
              class="p-1.5 text-muted hover:text-red-500 rounded-lg hover:bg-red-50 transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
      </button>
    </div>
  </div>

  <!-- Body -->
  <p class="text-[15px] leading-relaxed text-primary whitespace-pre-wrap break-words cursor-pointer note-body-clamped"
     x-data="{ expanded: false }"
     :class="expanded ? '' : 'note-body-clamped'"
     @click="expanded = !expanded">{{ note.description }}</p>

  <!-- Meta -->
  <p class="text-xs text-muted mt-2">{{ note.created_at.strftime('%b %d, %Y · %H:%M') }}</p>

  <!-- AI summary target -->
  <div id="summary-{{ note.id }}"></div>
</div>

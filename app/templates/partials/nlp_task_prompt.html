{% if discovered_tasks %}
<div class="mt-2 border border-[color:var(--border)] rounded-xl overflow-hidden"
     x-data="{ dismissed: false }" x-show="!dismissed" x-cloak>
  <div class="flex items-center justify-between px-3 py-1.5 bg-surface2 border-b border-base">
    <span class="text-[11px] font-semibold text-secondary flex items-center gap-1.5">
      <svg class="w-3 h-3 text-[color:var(--accent)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
      </svg>
      Detected {{ discovered_tasks|length }} task{{ 's' if discovered_tasks|length != 1 }}
    </span>
    <button @click="dismissed = true" class="text-muted hover:text-primary text-xs transition-colors leading-none">✕</button>
  </div>

  {% for task in discovered_tasks %}
  <div class="px-3 py-2 {% if not loop.last %}border-b border-base{% endif %}"
       id="nlp-task-{{ task.id }}"
       x-data="{ done: false }" x-show="!done">
    <p class="text-[12px] font-medium text-primary leading-snug">{{ task.title }}</p>
    {% if task.due_datetime %}
    <p class="text-[11px] text-[color:var(--accent)] mt-0.5 flex items-center gap-1">
      <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      {{ task.due_datetime }}
    </p>
    {% endif %}

    <div class="flex flex-wrap gap-1 mt-1.5">
      <!-- Confirm as local task -->
      <button
        hx-post="/tasks/{{ task.id }}/confirm"
        hx-target="#nlp-task-{{ task.id }}"
        hx-swap="outerHTML"
        class="text-[11px] btn-accent px-2 py-0.5 rounded font-medium">
        ✓ Add
      </button>

      <!-- Send to providers -->
      {% for provider in providers %}
      <form hx-post="/integrations/{{ provider }}/create-task"
            hx-target="#nlp-task-{{ task.id }}"
            hx-swap="outerHTML"
            @submit="$data.done = true">
        <input type="hidden" name="title" value="{{ task.title }}" />
        <input type="hidden" name="description" value="{{ task.description or '' }}" />
        <input type="hidden" name="dt" value="{{ task.due_datetime or '' }}" />
        <input type="hidden" name="task_type" value="{{ task.task_type }}" />
        <input type="hidden" name="task_id" value="{{ task.id }}" />
        <button type="submit"
                class="text-[11px] border border-base rounded px-2 py-0.5 text-secondary hover:bg-surface2 transition-colors">
          {% if provider == 'google' %}<svg class="w-3 h-3" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Google{% elif provider == 'microsoft' %}<svg class="w-3 h-3" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg> Microsoft{% endif %}
        </button>
      </form>
      {% endfor %}

      <!-- Dismiss -->
      <button
        hx-delete="/tasks/{{ task.id }}/dismiss"
        hx-target="#nlp-task-{{ task.id }}"
        hx-swap="outerHTML"
        class="text-[11px] text-muted hover:text-primary px-2 py-0.5 transition-colors">
        Skip
      </button>
    </div>
  </div>
  {% endfor %}
</div>
{% endif %}

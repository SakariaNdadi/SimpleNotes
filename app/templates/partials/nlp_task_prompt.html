{% if discovered_tasks %}
<div class="mt-2 border border-[color:var(--border)] rounded-xl overflow-hidden"
     id="nlp-prompt-{{ note.id }}">
  <details class="group">
    <summary class="flex items-center justify-between px-3 py-1.5 bg-surface2 cursor-pointer select-none [&::-webkit-details-marker]:hidden">
      <span class="text-[11px] font-semibold text-[color:var(--accent)] flex items-center gap-1.5">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
        </svg>
        Detected {{ discovered_tasks|length }} task{{ 's' if discovered_tasks|length != 1 }} — click to review &amp; edit
      </span>
      <div class="flex items-center gap-2">
        <svg class="w-3 h-3 text-muted transition-transform duration-150 group-open:rotate-180"
             fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
        <button type="button"
                onclick="event.preventDefault();document.getElementById('nlp-prompt-{{ note.id }}').remove()"
                class="text-muted hover:text-primary text-xs transition-colors leading-none">✕</button>
      </div>
    </summary>

    {% for task in discovered_tasks %}
    <div class="px-3 py-2 {% if not loop.last %}border-b border-base{% endif %}"
         id="nlp-task-{{ task.id }}"
         x-data="{ allDay: {{ 'true' if task.is_all_day else 'false' }} }">

      <form hx-post="/tasks/{{ task.id }}/confirm"
            hx-target="#nlp-task-{{ task.id }}"
            hx-swap="outerHTML"
            hx-on::after-request="htmx.trigger(document.body, 'taskCountChanged')"
            class="space-y-1.5">

        <input type="text" name="title" value="{{ task.title }}"
               class="w-full text-[12px] font-medium text-primary bg-transparent border-b border-base focus:border-[color:var(--accent)] outline-none pb-0.5" />
        <input type="text" name="description" value="{{ task.description or '' }}" placeholder="Description (optional)"
               class="w-full text-[11px] text-secondary bg-transparent border-b border-base focus:border-[color:var(--accent)] outline-none pb-0.5 placeholder-[color:var(--text-3)]" />

        <div class="space-y-1">
          <label class="flex items-center gap-1.5 text-[10px] text-muted cursor-pointer">
            <input type="checkbox" name="is_all_day" x-model="allDay" value="1"
                   {% if task.is_all_day %}checked{% endif %}
                   class="rounded accent-[color:var(--accent)]" />
            All day
          </label>
          <div x-show="!allDay" class="flex gap-1.5">
            <div class="flex-1">
              <label class="block text-[10px] text-muted mb-0.5">Start</label>
              <input type="datetime-local" name="due_datetime" value="{{ task.due_datetime or '' }}"
                     class="input-base w-full text-[10px] px-1.5 py-0.5 rounded border bg-surface outline-none focus:border-[color:var(--accent)]" />
            </div>
            <div class="flex-1">
              <label class="block text-[10px] text-muted mb-0.5">End</label>
              <input type="datetime-local" name="end_datetime" value=""
                     class="input-base w-full text-[10px] px-1.5 py-0.5 rounded border bg-surface outline-none focus:border-[color:var(--accent)]" />
            </div>
            <div>
              <label class="block text-[10px] text-muted mb-0.5">Type</label>
              <select name="task_type"
                      class="input-base text-[10px] px-1.5 py-0.5 rounded border bg-surface outline-none focus:border-[color:var(--accent)]">
                <option value="task" {% if task.task_type == 'task' %}selected{% endif %}>Task</option>
                <option value="event" {% if task.task_type == 'event' %}selected{% endif %}>Event</option>
              </select>
            </div>
          </div>
        </div>

        <div class="flex flex-wrap gap-1 pt-0.5">
          <button type="submit" class="text-[11px] btn-accent px-2 py-0.5 rounded font-medium">✓ Add</button>

          {% for provider in providers %}
          <button type="button"
                  hx-post="/integrations/{{ provider }}/create-task"
                  hx-include="closest form"
                  hx-target="#nlp-task-{{ task.id }}"
                  hx-swap="outerHTML"
                  hx-on::after-request="htmx.trigger(document.body, 'taskCountChanged')"
                  class="text-[11px] border border-base rounded px-2 py-0.5 text-secondary hover:bg-surface2 transition-colors flex items-center gap-1">
            {% if provider == 'google' %}<svg class="w-3 h-3" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Google{% elif provider == 'microsoft' %}<svg class="w-3 h-3" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg> Microsoft{% endif %}
          </button>
          {% endfor %}

          <button type="button"
                  hx-delete="/tasks/{{ task.id }}/dismiss"
                  hx-target="#nlp-task-{{ task.id }}"
                  hx-swap="outerHTML"
                  hx-on::after-request="htmx.trigger(document.body, 'taskCountChanged')"
                  class="text-[11px] text-muted hover:text-primary px-2 py-0.5 transition-colors">
            Skip
          </button>
        </div>
      </form>
    </div>
    {% endfor %}

  </details>
</div>
{% endif %}

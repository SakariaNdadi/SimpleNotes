<div class="relative flex gap-4 pb-6 group" id="note-{{ note.id }}">
  <!-- Dot -->
  <div class="flex-shrink-0 flex flex-col items-center z-10">
    <div class="w-2.5 h-2.5 rounded-full border-2 border-[color:var(--border)] bg-[color:var(--surface)] mt-1 group-hover:border-[color:var(--accent)] group-hover:bg-[color:var(--accent)] transition-all duration-200"></div>
  </div>

  <!-- Content -->
  <div class="flex-1 min-w-0">
    <!-- Top meta row -->
    <div class="flex items-start justify-between gap-2 mb-1.5">
      <div class="flex items-center gap-1.5 flex-wrap min-w-0">
        {% if note.label %}
        <span class="bg-tag text-[11px] font-medium px-2 py-0.5 rounded-full shrink-0">{{ note.label.title }}</span>
        {% endif %}
        {% if note.is_edited %}
        <span class="bg-edited text-[11px] px-2 py-0.5 rounded-full shrink-0" title="Edited {{ note.updated_at.strftime('%b %d, %Y %H:%M') }}">Edited</span>
        {% endif %}
      </div>
      <time class="text-[11px] text-muted whitespace-nowrap flex-shrink-0 mt-0.5">
        {{ note.created_at.strftime('%b %d · %H:%M') }}
      </time>
    </div>

    <!-- Body -->
    <p class="text-[14px] leading-relaxed text-primary whitespace-pre-wrap break-words cursor-pointer"
       x-data="{ expanded: false }"
       :class="expanded ? '' : 'note-body-clamped'"
       @click="expanded = !expanded">{{ note.description }}</p>

    <!-- Action row (hover) -->
    <div class="flex items-center gap-0.5 mt-2 opacity-0 group-hover:opacity-100 transition-opacity duration-150">
      <!-- AI Summary -->
      <button title="AI summary"
              hx-post="/ai/summary/{{ note.id }}"
              hx-target="#summary-{{ note.id }}"
              hx-swap="innerHTML"
              hx-indicator="#sum-ind-{{ note.id }}"
              class="p-1.5 text-muted hover:text-[color:var(--accent)] rounded-lg hover:bg-[color:var(--surface2)] transition-colors text-sm">✨</button>
      <span id="sum-ind-{{ note.id }}" class="htmx-indicator"><span class="spinner"></span></span>

      <!-- Edit -->
      <button title="Edit"
              hx-get="/notes/{{ note.id }}/edit"
              hx-target="#note-{{ note.id }}"
              hx-swap="outerHTML"
              class="p-1.5 text-muted hover:text-primary rounded-lg hover:bg-[color:var(--surface2)] transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
      </button>

      <!-- Archive -->
      <button title="Archive"
              hx-post="/notes/{{ note.id }}/archive"
              hx-target="#note-{{ note.id }}"
              hx-swap="outerHTML"
              class="p-1.5 text-muted hover:text-yellow-500 rounded-lg hover:bg-[color:var(--surface2)] transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8l1 12a2 2 0 002 2h8a2 2 0 002-2l1-12"/></svg>
      </button>

      <!-- History (only if history exists) -->
      {% if note.history %}
      <button title="Edit history"
              hx-get="/notes/{{ note.id }}/history"
              hx-target="#history-panel-{{ note.id }}"
              hx-swap="innerHTML"
              class="p-1.5 text-muted hover:text-primary rounded-lg hover:bg-[color:var(--surface2)] transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </button>
      {% endif %}

      <!-- Trash -->
      <button title="Move to trash"
              hx-delete="/notes/{{ note.id }}"
              hx-target="#note-{{ note.id }}"
              hx-swap="outerHTML"
              hx-confirm="Move this note to trash?"
              class="p-1.5 text-muted hover:text-red-500 rounded-lg hover:bg-red-50 transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
      </button>
    </div>

    <!-- AI summary target -->
    <div id="summary-{{ note.id }}"></div>

    <!-- History panel target -->
    <div id="history-panel-{{ note.id }}" class="mt-2"></div>
  </div>
</div>

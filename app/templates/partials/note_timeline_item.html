<div class="relative flex gap-2.5 pb-1 group hover:pb-3 transition-all duration-200" id="note-{{ note.id }}">
    <div class="flex-shrink-0 flex flex-col items-center z-10">
        <div
            class="w-2 h-2 rounded-full border-2 border-[color:var(--border)] bg-[color:var(--surface)] mt-1.5 group-hover:border-[color:var(--accent)] group-hover:bg-[color:var(--accent)] transition-all duration-200">
        </div>
    </div>

    <div class="flex-1 min-w-0">
        <div class="flex items-start justify-between gap-2 mb-0.5">
            <div class="flex items-center gap-1.5 flex-wrap min-w-0">
                {% if note.label %}
                <span
                    class="bg-tag text-[10px] font-medium px-1.5 py-0.5 rounded shrink-0">{{ note.label.title }}</span>
                {% endif %}
                {% if note.is_edited %}
                <span class="bg-edited text-[10px] px-1.5 py-0.5 rounded shrink-0"
                    title="Edited {{ note.updated_at.strftime('%b %d, %Y %H:%M') }}">Edited</span>
                {% endif %}
            </div>
            <time class="text-[10px] text-muted whitespace-nowrap flex-shrink-0 mt-0.5">
                {{ note.created_at.strftime('%b %d · %H:%M') }}
            </time>
        </div>

        <p class="text-[13px] leading-snug text-primary whitespace-pre-wrap break-words cursor-pointer"
            x-data="{ expanded: false }" :class="expanded ? '' : 'note-body-clamped'" @click="expanded = !expanded">
            {{ note.description }}</p>

        <div
            class="flex items-center gap-0.5 max-h-0 overflow-hidden opacity-0 group-hover:max-h-8 group-hover:mt-1 group-hover:opacity-100 transition-all duration-200">
            <button title="AI summary" hx-post="/ai/summary/{{ note.id }}" hx-target="#summary-{{ note.id }}"
                hx-swap="innerHTML" hx-indicator="#sum-ind-{{ note.id }}"
                class="p-1 text-muted hover:text-[color:var(--accent)] rounded hover:bg-[color:var(--surface2)] transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </button>
            <span id="sum-ind-{{ note.id }}" class="htmx-indicator"><span class="spinner"></span></span>

            <button title="Edit" hx-get="/notes/{{ note.id }}/edit" hx-target="#note-{{ note.id }}" hx-swap="outerHTML"
                class="p-1 text-muted hover:text-primary rounded hover:bg-[color:var(--surface2)] transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
            </button>

            <button title="Archive" hx-post="/notes/{{ note.id }}/archive" hx-target="#note-{{ note.id }}"
                hx-swap="outerHTML"
                class="p-1 text-muted hover:text-yellow-500 rounded hover:bg-[color:var(--surface2)] transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8l1 12a2 2 0 002 2h8a2 2 0 002-2l1-12" />
                </svg>
            </button>

            {% if note.history %}
            <button title="Edit history" hx-get="/notes/{{ note.id }}/history" hx-target="#history-panel-{{ note.id }}"
                hx-swap="innerHTML"
                class="p-1 text-muted hover:text-primary rounded hover:bg-[color:var(--surface2)] transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </button>
            {% endif %}

            <button title="Move to trash" hx-delete="/notes/{{ note.id }}" hx-target="#note-{{ note.id }}"
                hx-swap="outerHTML" hx-confirm="Move this note to trash?"
                class="p-1 text-muted hover:text-red-500 rounded hover:bg-red-50 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>
        </div>

        <div id="summary-{{ note.id }}"></div>
        <div id="history-panel-{{ note.id }}" class="mt-1"></div>
        {% if discovered_tasks is defined %}
        {% include "partials/nlp_task_prompt.html" %}
        {% endif %}
    </div>
</div>

<div class="relative timeline-feed">
    {% for note in notes %}
    {% include "partials/note_timeline_item.html" %}
    {% endfor %}
</div>

{% if has_more %}
<div hx-get="/notes?offset={{ next_offset }}&label_id={{ label_id }}" hx-trigger="revealed" hx-swap="outerHTML">
    <div class="text-center text-muted text-[12px] py-4">Loading more...</div>
</div>
{% endif %}

{% if not notes %}
<div class="text-center text-muted py-10">
    <svg class="w-8 h-8 mx-auto mb-2 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
    </svg>
    <p class="text-[12px]">{% if is_search %}No notes matched your search.{% else %}No notes yet — create your first
        one!{% endif %}</p>
</div>
{% endif %}

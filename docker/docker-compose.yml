services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=dev
      - DATABASE_URL=sqlite:////data/notes.db
    env_file:
      - ../.env
    volumes:
      - notes_data:/data
      - ../:/app  # hot-reload in dev
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  notes_data:

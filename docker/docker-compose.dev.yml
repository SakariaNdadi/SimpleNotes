services:
  db:
    image: pgvector/pgvector:pg17
    container_name: postgres-pgvector-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: notes
      POSTGRES_USER: notes
      POSTGRES_PASSWORD: notes
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: meilisearch-dev
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILI_KEY:-devmasterkey}
      - MEILI_ENV=development
    volumes:
      - meili_data_dev:/meili_data

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ENV=prod
      - DATABASE_URL=postgresql://notes:notes@db:5432/notes
      - MEILI_URL=http://meilisearch:7700
      - MEILI_KEY=${MEILI_KEY:-devmasterkey}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-}
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - ../:/app
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data_dev:
  meili_data_dev:

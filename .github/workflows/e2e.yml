name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: notes_test
          POSTGRES_USER: notes
          POSTGRES_PASSWORD: notes
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U notes"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://notes:notes@localhost:5432/notes_test
      SECRET_KEY: ci-secret-key-not-for-production-use
      ENV: dev

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Generate Fernet key
        run: |
          KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          echo "FERNET_KEY=$KEY" >> $GITHUB_ENV

      - name: Start dev server
        run: |
          uv run uvicorn main:app --host 0.0.0.0 --port 8000 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/login && break || sleep 2
          done

      - name: Run E2E tests
        run: uv run pytest tests/e2e/ -v --tb=short

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
